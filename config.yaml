# 鏈嶅姟鍣ㄩ厤缃?
server:
  host: 0.0.0.0
  port: 8001
  reload: false

# API 閰嶇疆
api:
  # Bearer Token 璁よ瘉
  # 鐣欑┖鍒欑鐢ㄨ璇侊紙寮€鍙戞ā寮忥級
  # 鐢熶骇鐜璇疯缃己瀵嗙爜 token
  token: "123456"
  
  # 杈撳嚭鏂囦欢閰嶇疆
  output:
    # 浠诲姟杈撳嚭鐩綍锛堟瘡涓换鍔′竴涓瓙鐩綍锛?
    tasks_dir: "tasks"
    # 鏂囦欢淇濈暀鏃堕棿锛堝皬鏃讹級锛岃秴杩囨鏃堕棿鐨勬枃浠朵細琚嚜鍔ㄦ竻鐞?
    retention_hours: 8
    # 娴佸紡涓嬭浇鍚庢槸鍚﹀垹闄ゆ枃浠讹紙鎺ㄨ崘 true锛?
    delete_after_stream: true

# TTS妯″瀷閰嶇疆
tts:
  # 璺緞閰嶇疆
  # 璺緞閰嶇疆
  paths:
    # 妯″瀷鏍圭洰褰?(瀛樻斁鎵€鏈夋ā鍨嬫枃浠剁殑鍩虹鐩綍)
    models_root: "models"
  
  # 妯″瀷榛樿閰嶇疆 (杩愯鏃?
  model:
    runtime_settings:
      use_cuda_kernel: false # 鏄惁浣跨敤 CUDA Kernel
      use_deepspeed: false   # 鏄惁浣跨敤 Deepspeed
      unload_after_gen: true # 鐢熸垚瀹屾瘯鍚庢槸鍚﹂噴鏀炬樉瀛?(鑺傜渷璧勬簮浣嗗鍔犱笅娆＄敓鎴愮瓑寰呮椂闂?

  # 澶氱増鏈ā鍨嬮厤缃?
  versions:
    "V1.5":
      module: "app.core.indextts.infer"
      class_name: "IndexTTS"
      # 妯″瀷鐩綍 (鐢ㄦ埛闇€鏍规嵁瀹為檯鎯呭喌淇敼)
      model_dir: "IndexTTS-1.5"
      config_file: "config.yaml"
      
    "V2.0":
      module: "app.core.indextts.infer_v2"
      class_name: "IndexTTS2"
      # 妯″瀷鐩綍
      model_dir: "IndexTTS-2"
      config_file: "config.yaml"
  
  # 瀛楀箷鐢熸垚閰嶇疆
  subtitle:
    # 鏄惁鍚敤瀛楀箷鐢熸垚鍔熻兘锛堥粯璁ゅ叧闂紝鐢ㄦ埛閫氳繃 API 鍙傛暟 generate_subtitle 鎺у埗锛?
    enabled: false
    # Whisper 妯″瀷璺緞锛堢浉瀵逛簬 models_root锛?
    whisper_model: "whisper/faster-whisper-large-v2"
    # Whisper 鎺ㄧ悊閰嶇疆
    whisper_config:
      beam_size: 5              # Beam search 澶у皬锛屽奖鍝嶈浆褰曞噯纭€?
      word_timestamps: true     # 鍚敤璇嶇骇鏃堕棿鎴筹紙蹇呴』涓?true锛?
    # 鏂囨湰瀵归綈閰嶇疆
    alignment:
      match_threshold: 75       # 妯＄硦鍖归厤闃堝€?(0-100)锛屼綆浜庢鍊肩殑鍖归厤灏嗚蹇界暐
      search_window_multiplier: 3  # 鎼滅储绐楀彛澶у皬鍊嶆暟锛堢獥鍙ｅぇ灏?= 鏂囨湰闀垮害 脳 鍊嶆暟 + 20锛?
