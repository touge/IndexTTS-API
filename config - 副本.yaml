# 服务端设置
server:
  host: 0.0.0.0
  port: 10001
  reload: false

# API 接口配置
api:
  # Bearer Token 验证
  # 取消注释或留空可禁用验证模式
  # 建议在生产环境强校验 token
  token: "123456"
  
  # 输出文件设置
  output:
    # 存放任务的目录（每个任务一个子目录）
    tasks_dir: "tasks"
    # 文件保留时间（小时），超时后文件会被自动清理
    retention_hours: 8
    # 流式下载后是否删除文件（建议 true）
    delete_after_stream: true
  
  # 文件上传限制
  upload:
    # 文件大小限制（单位：MB）
    max_subtitle_audio_size: 1024  # 字幕长音频文件限制 (1GB)
    max_reference_audio_size: 300  # 参考音频/短音频文件限制 (300MB)
    max_text_size: 50              # 文本文件大小限制 (50MB)
    
    # 允许的文件扩展名
    allowed_audio_extensions:
      - .wav
      - .mp3
      - .flac
      - .ogg
      - .m4a
    allowed_text_extensions:
      - .txt
      - .md

# TTS 模型设置
tts:
  # 路径设置
  paths:
    # 模型根目录（该目录通常包含所有模型文件夹）
    models_root: "models"
  
  # 模型默认设置（运行时）
  model:
    runtime_settings:
      use_cuda_kernel: false # 是否使用 CUDA Kernel
      use_deepspeed: false   # 是否使用 Deepspeed
      unload_after_gen: true # 生成完毕后是否释放显存（节省显存，但会增加下次生成等待时间）

  # 多版本模型配置
  versions:
    "V1.5":
      module: "app.core.indextts.infer"
      class_name: "IndexTTS"
      # 模型目录（如果用户不可自定义，请不要修改）
      model_dir: "IndexTTS-1.5"
      config_file: "config.yaml"
      
    "V2.0":
      module: "app.core.indextts.infer_v2"
      class_name: "IndexTTS2"
      # 模型目录
      model_dir: "IndexTTS-2"
      config_file: "config.yaml"
  
  # 字幕生成设置
  subtitle:
    # 是否开启字幕生成功能（默认关闭，由用户通过 API 参数 generate_subtitle 控制）
    enabled: false
    # Whisper 模型路径（相对于 models_root）
    whisper_model: "whisper/faster-whisper-large-v2"
    # Whisper 推理参数
    whisper_config:
      beam_size: 5              # Beam search 倍率大小，影响转录准确度
      word_timestamps: true     # 启用词级时间戳（必须为 true）
    # 文本对齐设置
    alignment:
      match_threshold: 75       # 模糊匹配阈值 (0-100)，低于此值认为匹配失败
      search_window_multiplier: 3  # 搜索窗口大小数，计算窗口大小 = 文本字数 × 倍数 + 20秒

# 日志文件动态清理设置（清理 logs/latest.log）
log_cleanup:
  # 检查定时间隔（分钟）
  check_interval_minutes: 30
  # latest.log 达到多大（MB）时进行打包归档
  max_size_mb: 5
  # 归档后 latest.log 保留最近的行数（0 = 完全清空）
  keep_lines: 200
  # logs/ 目录下最多保留的历史归档文件数量
  max_archives: 7